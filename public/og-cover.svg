<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="rentaSkii — Gulf Coast Jet Ski Rentals">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#0d3a52"/>
      <stop offset="0.55" stop-color="#09212f"/>
      <stop offset="1" stop-color="#061620"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb054"/>
      <stop offset="0.55" stop-color="#ff7a45"/>
      <stop offset="1" stop-color="#ff5e62"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- sunset glow -->
  <circle cx="930" cy="250" r="170" fill="url(#sun)" opacity="0.95"/>
  <circle cx="930" cy="250" r="230" fill="#ff7a45" opacity="0.12"/>

  <!-- layered surf -->
  <g fill="none" stroke-linecap="round">
    <path d="M0 470c70 0 70-34 140-34s70 34 140 34 70-34 140-34 70 34 140 34 70-34 140-34 70 34 140 34 70-34 140-34 70 34 140 34"
      stroke="url(#teal)" stroke-width="9" opacity="0.9"/>
    <path d="M0 522c70 0 70-34 140-34s70 34 140 34 70-34 140-34 70 34 140 34 70-34 140-34 70 34 140 34 70-34 140-34 70 34 140 34"
      stroke="#2dd4bf" stroke-width="9" opacity="0.55"/>
    <path d="M0 574c70 0 70-34 140-34s70 34 140 34 70-34 140-34 70 34 140 34 70-34 140-34 70 34 140 34 70-34 140-34 70 34 140 34"
      stroke="#0d9488" stroke-width="9" opacity="0.4"/>
  </g>

  <!-- eyebrow -->
  <g transform="translate(90 188)">
    <rect x="0" y="-9" width="40" height="5" rx="2.5" fill="#2dd4bf"/>
    <text x="56" y="0" font-family="Outfit, Verdana, sans-serif" font-size="26" font-weight="700"
      letter-spacing="4" fill="#5eead4">JOHN'S PASS VILLAGE · MADEIRA BEACH, FL</text>
  </g>

  <!-- wordmark -->
  <text x="88" y="320" font-family="Outfit, Verdana, sans-serif" font-size="124" font-weight="700"
    letter-spacing="-3" fill="#eef5f8">renta<tspan fill="url(#sun)">Skii</tspan></text>

  <!-- tagline -->
  <text x="92" y="392" font-family="Inter, Verdana, sans-serif" font-size="40" font-weight="500"
    fill="#a7bcc8">Premium Sea-Doo &amp; Yamaha jet ski rentals —</text>
  <text x="92" y="444" font-family="Inter, Verdana, sans-serif" font-size="40" font-weight="500"
    fill="#a7bcc8">book online &amp; ride the same day.</text>

  <!-- rating pill -->
  <g transform="translate(92 500)">
    <rect x="0" y="0" width="290" height="62" rx="31" fill="#102b3c" stroke="#1f4860" stroke-width="2"/>
    <path d="M40 16l7 14 15 2-11 11 3 15-14-7-14 7 3-15-11-11 15-2z" fill="#ffc24b"/>
    <text x="78" y="40" font-family="Inter, Verdana, sans-serif" font-size="27" font-weight="600"
      fill="#eef5f8">4.9 · 600+ rider reviews</text>
  </g>
</svg>
